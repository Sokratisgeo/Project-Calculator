<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A very Simple Calculator Project</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="calculator">
    <h2>Calculator</h2>

    <div id="display" class="display" aria-live="polite">0</div>

    <div class="keys" id="keys">
      <button class="clear" data-action="clear">C</button>
      <button class="del" data-action="delete">DEL</button>
      <button class="operators" data-value="/">÷</button>
      <button class="operators" data-value="*">×</button>

      <button data-value="7">7</button>
      <button data-value="8">8</button>
      <button data-value="9">9</button>
      <button class="operators" data-value="-">-</button>

      <button data-value="4">4</button>
      <button data-value="5">5</button>
      <button data-value="6">6</button>
      <button class="operators" data-value="+">+</button>

      <button data-value="1">1</button>
      <button data-value="2">2</button>
      <button data-value="3">3</button>
      <button class="equals" data-action="equals">=</button>

      <button class="zero" data-value="0">0</button>
      <button data-value=".">.</button>
    </div>
  </main>

  <script src="index.js"></script>
</body>
</html>
